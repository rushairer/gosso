name: Feature Request
description: Suggest a new feature or improvement for gosso
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe the problem you're trying to solve and how you'd like it to work.
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this feature solve? Is it related to a protocol, compliance requirement, or usability gap?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should this work? Be as specific as possible.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you considered any alternative approaches?
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of gosso does this relate to?
      options:
        - OAuth 2.0 / Authorization
        - OIDC / Discovery
        - Authentication (login, MFA, WebAuthn)
        - Social login
        - Admin API
        - Session / Token management
        - Configuration / Deployment
        - Documentation
        - Testing / CI
        - Other
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Links to specs (RFC, OIDC standard), related issues, or screenshots.
