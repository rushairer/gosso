name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.26"
  COVERAGE_MIN: "60"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          args: --out-format sarif:./golangci-lint.sarif

      - name: Upload gosec SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: ./golangci-lint.sarif
          category: golangci-lint

  architecture-check:
    name: Architecture Invariants
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run architecture invariant checks
        run: bash script/check-architecture.sh

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: Verify go mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum || (echo "go.mod/go.sum not tidy. Run 'go mod tidy' and commit." && exit 1)

      - name: Run unit tests
        run: |
          packages=$(go list ./... | grep -Ev '/(cmd|deploy|docs|examples|script|tests)(/|$)')
          go test -p 1 -race -coverprofile=coverage.out -covermode=atomic $packages

      - name: Check coverage threshold
        run: |
          packages=$(./script/coverage-packages.sh)
          go test -p 1 -coverprofile=coverage-gate.out -covermode=atomic $packages
          go tool cover -func=coverage-gate.out | grep -E '^total:' | awk '{print $3}' | sed 's/%//' | { read cov; echo "Coverage gate total: ${cov}%"; if [ "$(echo "$cov < ${COVERAGE_MIN}" | bc -l)" -eq 1 ]; then echo "Coverage ${cov}% is below ${COVERAGE_MIN}% threshold"; exit 1; fi; }

      - name: Check critical package coverage
        run: ./script/check-critical-coverage.sh

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            coverage.out
            coverage-gate.out

      - name: Per-module coverage report
        if: always()
        run: |
          echo "## Module Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Module | Coverage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|----------|--------|" >> $GITHUB_STEP_SUMMARY

          FAIL=0
          for dir in internal/*/; do
            module=$(basename "$dir")
            # Skip directories without Go files
            if ! ls "$dir"*.go &>/dev/null && ! ls "$dir"*/*.go &>/dev/null; then
              continue
            fi
            cov=$(go tool cover -func=coverage.out 2>/dev/null | grep "github.com/rushairer/gosso/$dir" | awk '{sum+=$3; n++} END {if(n>0) printf "%.1f", sum/n; else print "0.0"}' | sed 's/%//')
            if [ -z "$cov" ] || [ "$cov" = "0.0" ]; then
              continue
            fi

            if [ "$(echo "$cov < 40" | bc -l 2>/dev/null || echo 0)" -eq 1 ]; then
              echo "| \`$module\` | ${cov}% | ⚠️ Below 40% |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| \`$module\` | ${cov}% | ✅ |" >> $GITHUB_STEP_SUMMARY
            fi
          done
        shell: bash

  govulncheck:
    name: Vulnerability Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      - name: Run govulncheck
        run: govulncheck ./...

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: gosso_test
          POSTGRES_USER: gosso
          POSTGRES_PASSWORD: ${{ secrets.TEST_POSTGRES_PASSWORD }}
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U gosso"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6381:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: Run integration tests
        run: go test -p 1 -tags=integration -v -count=1 -timeout=120s ./internal/auth/service/ ./internal/session/service/ ./internal/token/service/ ./internal/account/ ./middleware/
        env:
          GOUNO_DATABASE_DRIVERS_POSTGRES_DSN: "host=127.0.0.1 user=gosso password=${{ secrets.TEST_POSTGRES_PASSWORD }} dbname=gosso_test port=5434 sslmode=disable"
          GOUNO_REDIS_DSN: "redis://127.0.0.1:6381/0"

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: Build binary
        run: |
          go build -buildvcs=false -ldflags="-s -w" -o bin/gosso ./cmd

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: gosso-binary
          path: bin/gosso

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [architecture-check, integration-test, build]

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Docker build context
        run: |
          docker build \
            --target builder \
            --build-arg VERSION=${{ github.sha }} \
            -t gosso-builder:${{ github.sha }} \
            .

      - name: Build Docker image
        run: |
          docker build \
            --build-arg VERSION=${{ github.sha }} \
            -t gosso:${{ github.sha }} \
            -t gosso:latest \
            ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && format('-t ghcr.io/{0}/gosso:{1} -t ghcr.io/{0}/gosso:latest', github.repository) || '' }} \
            .

      - name: Push Docker image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker push ghcr.io/${{ github.repository }}/gosso:${{ github.sha }}
          docker push ghcr.io/${{ github.repository }}/gosso:latest

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [docker]

    steps:
      - uses: actions/checkout@v4

      - name: Build image for scanning
        run: |
          docker build \
            --build-arg VERSION=${{ github.sha }} \
            -t gosso-scan:${{ github.sha }} \
            .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: gosso-scan:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true
