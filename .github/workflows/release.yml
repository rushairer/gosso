name: Release

on:
  push:
    tags:
      - "v*"

# Default to least-privilege; jobs override as needed
permissions:
  contents: read

# Cancel redundant runs on the same tag
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.26"

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write
      id-token: write   # needed for cosign keyless signing

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: Lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.12.2

      - name: Test
        run: go test -race -count=1 ./internal/...

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        run: |
          docker build \
            --build-arg VERSION=${{ steps.version.outputs.VERSION }} \
            -t ghcr.io/${{ github.repository }}/gosso:${{ steps.version.outputs.VERSION }} \
            -t ghcr.io/${{ github.repository }}/gosso:latest \
            .
          docker push ghcr.io/${{ github.repository }}/gosso:${{ steps.version.outputs.VERSION }}
          docker push ghcr.io/${{ github.repository }}/gosso:latest

      # --- Supply Chain Security: SBOM + Cosign ---

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign Docker image with cosign
        env:
          DIGEST: ${{ steps.docker-build.outputs.digest }}
        run: |
          # Sign both version and latest tags
          cosign sign --yes \
            ghcr.io/${{ github.repository }}/gosso@$(docker inspect --format='{{index .RepoDigests 0}}' ghcr.io/${{ github.repository }}/gosso:${{ steps.version.outputs.VERSION }} | cut -d@ -f2)

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ghcr.io/${{ github.repository }}/gosso:${{ steps.version.outputs.VERSION }}
          format: cyclonedx-json
          output-file: gosso-sbom.cdx.json

      - name: Attest SBOM to image
        run: |
          cosign attest --yes \
            --predicate gosso-sbom.cdx.json \
            --type cyclonedx \
            ghcr.io/${{ github.repository }}/gosso:${{ steps.version.outputs.VERSION }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          generate_release_notes: true
          files: |
            CHANGELOG.md
            gosso-sbom.cdx.json
