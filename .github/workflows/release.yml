name: Release

on:
  push:
    tags:
      - "v*"

# Default to least-privilege; jobs override as needed
permissions:
  contents: read

# Cancel redundant runs on the same tag
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.26.5"

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write
      id-token: write   # needed for cosign keyless signing

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: Lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.12.2

      - name: Test
        run: go test -race -count=1 ./internal/...

      - name: Set up QEMU (for ARM64 emulation)
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Validate release metadata
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          test "$VERSION" = "$(awk '$1 == "version:" { print $2; exit }' deploy/helm/gosso/Chart.yaml)"
          grep -Fq "## [$VERSION]" CHANGELOG.md

      - name: Build and push Docker image (multi-arch)
        id: docker-build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: VERSION=${{ steps.version.outputs.VERSION }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/gosso:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository_owner }}/gosso:sha-${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/gosso:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      # --- Supply Chain Security: SBOM + Cosign ---

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign Docker image with cosign
        run: |
          cosign sign --yes \
            ghcr.io/${{ github.repository_owner }}/gosso@${{ steps.docker-build.outputs.digest }}

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ghcr.io/${{ github.repository_owner }}/gosso@${{ steps.docker-build.outputs.digest }}
          format: cyclonedx-json
          output-file: gosso-sbom.cdx.json

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ghcr.io/${{ github.repository_owner }}/gosso@${{ steps.docker-build.outputs.digest }}
          format: spdx-json
          output-file: gosso-sbom.spdx.json

      - name: Attest SBOM to image
        run: |
          cosign attest --yes \
            --predicate gosso-sbom.cdx.json \
            --type cyclonedx \
            ghcr.io/${{ github.repository_owner }}/gosso@${{ steps.docker-build.outputs.digest }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          generate_release_notes: true
          files: |
            CHANGELOG.md
            gosso-sbom.cdx.json
            gosso-sbom.spdx.json

      # --- Helm Chart OCI Publish ---

      - name: Install Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1

      - name: Update Helm chart version
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          sed -i "s/^version:.*/version: ${VERSION}/" deploy/helm/gosso/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" deploy/helm/gosso/Chart.yaml

      - name: Package and push Helm chart to GHCR
        run: |
          helm package deploy/helm/gosso
          helm push gosso-*.tgz oci://ghcr.io/${{ github.repository_owner }}/gosso/charts
