name: Release

on:
  push:
    tags:
      - "v*"

# Default to least-privilege; jobs override as needed
permissions:
  contents: read

# Cancel redundant runs on the same tag
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.26"

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write
      id-token: write   # needed for cosign keyless signing

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: Lint
        uses: golangci/golangci-lint-action@9fae48acfc02a90574d7c304a1758ef9895495fa # v7.0.1
        with:
          version: v2.12.2

      - name: Test
        run: go test -race -count=1 ./internal/...

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        run: |
          docker build \
            --build-arg VERSION=${{ steps.version.outputs.VERSION }} \
            -t ghcr.io/${{ github.repository }}/gosso:${{ steps.version.outputs.VERSION }} \
            -t ghcr.io/${{ github.repository }}/gosso:latest \
            .
          docker push ghcr.io/${{ github.repository }}/gosso:${{ steps.version.outputs.VERSION }}
          docker push ghcr.io/${{ github.repository }}/gosso:latest

      # --- Supply Chain Security: SBOM + Cosign ---

      - name: Install cosign
        uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # v3.10.1

      - name: Sign Docker image with cosign
        env:
          DIGEST: ${{ steps.docker-build.outputs.digest }}
        run: |
          # Sign both version and latest tags
          cosign sign --yes \
            ghcr.io/${{ github.repository }}/gosso@$(docker inspect --format='{{index .RepoDigests 0}}' ghcr.io/${{ github.repository }}/gosso:${{ steps.version.outputs.VERSION }} | cut -d@ -f2)

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ghcr.io/${{ github.repository }}/gosso:${{ steps.version.outputs.VERSION }}
          format: cyclonedx-json
          output-file: gosso-sbom.cdx.json

      - name: Attest SBOM to image
        run: |
          cosign attest --yes \
            --predicate gosso-sbom.cdx.json \
            --type cyclonedx \
            ghcr.io/${{ github.repository }}/gosso:${{ steps.version.outputs.VERSION }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          generate_release_notes: true
          files: |
            CHANGELOG.md
            gosso-sbom.cdx.json
