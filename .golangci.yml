version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - misspell
    - unconvert
    - bodyclose
    - nilerr
    # --- Added for architecture invariant enforcement ---
    - errorlint      # E1: correct errors.Is/errors.As usage
    - dupl           # R1: detect duplicate code blocks (scan helpers)
    - exhaustive
    - gosec     # General: switch exhaustiveness
  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment
        - shadow
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
      disabled-checks:
        - hugeParam
        - rangeValCopy
    misspell:
      locale: US
    errorlint:
      # Check errors.Is / errors.As usage
      errorf: true
      asserts: true
      comparison: true
    dupl:
      # Threshold in tokens — 150 is a reasonable default for Go
      threshold: 150
    exhaustive:
      # Only flag switch statements on enum-like types that are missing cases
      default-signifies-exhaustive: true
  exclusions:
    rules:
      # Test files can be more relaxed
      - path: _test\.go
        linters:
          - errcheck
          - unparam
          - ineffassign
          - wrapcheck
          - errorlint
          - dupl
      # Generated code
      - path: \.gen\.go$
        linters:
          - errcheck
          - govet
      # Allow fmt.Errorf wrapping without %w in some cases
      - linters:
          - gocritic
        text: "singleCaseSwitch"
      # defer tx.Rollback() is standard Go pattern — error is intentionally ignored
      - linters:
          - errcheck
        text: "tx\\.Rollback"
      # Password reset intentionally returns nil to prevent email enumeration
      - path: internal/auth/service/password_reset_service\.go
        linters:
          - nilerr
      # defer in loop: ActivateTOTP returns immediately so defer only runs once
      - path: internal/auth/service/mfa_service\.go
        linters:
          - gocritic
        text: "deferInLoop"
      # Known development/test placeholders and protocol action names, not secrets.
      - linters:
          - gosec
        text: "G101:"
      # Cookie attributes are set intentionally; CSRF cookies are JS-readable by design.
      - linters:
          - gosec
        text: "G124:"
      # Reviewed gosec findings: bounded conversions, test-only ignored errors, controlled paths,
      # and request-independent cleanup work.
      - linters:
          - gosec
        text: "G104:|G115:|G118:|G304:|G706:"
      # IntrospectToken returns {"active": false} per RFC 7662, not an error
      - path: internal/token/service/token_service\.go
        linters:
          - nilerr
      # ifElseChain is a style preference, not a bug
      - linters:
          - gocritic
        text: "ifElseChain"
      # preferStringWriter is a style preference
      - linters:
          - gocritic
        text: "preferStringWriter"
      # Commented-out test code is intentional for future reference
      - linters:
          - gocritic
        text: "commentedOutCode"

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/rushairer/gosso

issues:
  max-issues-per-linter: 50
  max-same-issues: 5

output:
  formats:
    text:
      path: stdout
