# Prometheus configuration for gosso development environment.
# See: https://prometheus.io/docs/prometheus/latest/configuration/

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "gosso"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["gosso:8080"]
        labels:
          environment: "development"
