# Test configuration
# Sensitive values MUST be overridden with GOUNO_ prefixed env vars.
# Example:
#   GOUNO_DATABASE_DRIVERS_POSTGRES_DSN="host=127.0.0.1 user=gosso password=<password> dbname=gosso_test port=5434 sslmode=disable TimeZone=Asia/Shanghai"
web_server:
    debug: true
    address: 0.0.0.0
    port: 8080
    idle_timeout: 60s
    read_timeout: 5s
    read_header_timeout: 2s
    write_timeout: 30s
    request_timeout: 10s
    max_body_size: 10485760 # 10MB
    rate_limits:
        login: 5
        token: 10
        passkey: 10
        api: 60
        introspect: 20
        device_code: 10
database:
    default: postgres
    drivers:
        postgres:
            name: postgres
            driver: pgx
            dsn: ${GOUNO_DATABASE_DRIVERS_POSTGRES_DSN}
            log_level: 1 #日志级别, 1:Silent 2:Error 3:Warn 4:Info
redis:
    dsn: redis://127.0.0.1:6381/0
    max_active_conns: 100
    pool_timeout_seconds: 60
task_pipeline:
    flush_size: 32
    buffer_size: 64
    flush_interval: 1s
smtp:
    host: localhost
    port: 1027
    username: ""
    password: ""
    from: "noreply@gosso.com"
    tls_policy: "notls"
log:
    level: -1 #日志级别, -1: debug, 0: info, 1: warn, 2: error, 3: dpanic, 4: panic, 5: fatal
auth:
    issuer: "http://localhost:8080"
    # Test-only TOTP key — 32 bytes hex. MUST be overridden via GOUNO_AUTH_TOTP_ENCRYPTION_KEY in production.
    totp_encryption_key: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
    access_token_expiry: 15m
    refresh_token_expiry: 24h
    authorization_code_expiry: 10m
    id_token_expiry: 15m
    session_ttl: 24h
    max_sessions: 5
    default_scopes:
        - openid
        - profile
        - email
    private_key_path: ""
    key_id: "test-key"
    password_reset_base_url: "http://localhost:3000/reset-password"