# Test configuration
# Sensitive values MUST be overridden with GOUNO_ prefixed env vars.
# Example:
#   GOUNO_DATABASE_DRIVERS_POSTGRES_DSN="host=127.0.0.1 user=gosso password=<password> dbname=gosso_test port=5434 sslmode=disable TimeZone=Asia/Shanghai"
web_server:
    debug: true
    address: 0.0.0.0
    port: 8080
    idle_timeout: 60s
    read_timeout: 5s
    read_header_timeout: 2s
    write_timeout: 30s
    request_timeout: 10s
    max_body_size: 10485760 # 10MB
    shutdown_timeout: 30s
    trusted_proxies:
        - "127.0.0.1"
        - "::1"
    csrf_skip_paths:
        - "/api/v1/auth/login"
        - "/api/v1/auth/password/forgot"
        - "/api/v1/auth/password/reset"
    rate_limits:
        login: 5
        token: 10
        passkey: 10
        api: 60
        admin: 30
        introspect: 20
        device_code: 10
        password: 3
        verify: 3
        health: 60
database:
    default: postgres
    drivers:
        postgres:
            name: postgres
            driver: pgx
            dsn: ${GOUNO_DATABASE_DRIVERS_POSTGRES_DSN}
            log_level: 1 #日志级别, 1:Silent 2:Error 3:Warn 4:Info
redis:
    dsn: redis://127.0.0.1:6381/0
    max_active_conns: 100
    pool_timeout_seconds: 60
task_pipeline:
    flush_size: 32
    buffer_size: 64
    flush_interval: 1s
smtp:
    host: localhost
    port: 1027
    username: ""
    password: ""
    from: "noreply@gosso.com"
    tls_policy: "notls"
log:
    level: -1 #日志级别, -1: debug, 0: info, 1: warn, 2: error, 3: dpanic, 4: panic, 5: fatal
auth:
    issuer: "http://localhost:8080"
    # Deterministic test-only 32-byte key encoded as the required 64 hex characters.
    totp_encryption_key: "a9fd7106e9647479494fddf8a850b6d9a09114c0afa81e77385686f5455e7270"
    access_token_expiry: 15m
    refresh_token_expiry: 24h
    authorization_code_expiry: 10m
    id_token_expiry: 15m
    session_ttl: 24h
    max_sessions: 5
    default_scopes:
        - openid
        - profile
        - email
    private_key_path: ""
    key_id: "test-key"
    password_reset_base_url: "http://localhost:8080/reset-password"
    login_rate_limit_window: 15m
    # Per-IP rate limit exemption for known NAT/proxy exit addresses.
    # The per-IP counter is intentionally NOT cleared after successful login
    # to prevent attackers from resetting the budget with stolen credentials.
    # If legitimate users share a public IP (NAT/proxy), add it here.
    # Per-IP+username limits still apply regardless of this allowlist.
    # login_ip_allowlist:
    #     - "203.0.113.0/24"
    #     - "198.51.100.5"
    mfa_account_rate_limit_window: 15m
    password_reset_revoke_concurrency: 5
    # SPA integration
    login_url: "/login"
    enable_cookie_auth: true
    auth_cookie_name: "access_token"
    include_user_roles: true
observability:
    metrics_enabled: false
    tracing_enabled: false
