# Test configuration
# Sensitive values can be overridden with GOUNO_ prefixed env vars.
# Example: GOUNO_AUTH_JWT_SECRET=my-secret GOUNO_DATABASE_DRIVERS_POSTGRES_DSN=host=...
web_server:
    address: 0.0.0.0
    port: 8080
    idle_timeout: 60s
    read_timeout: 5s
    read_header_timeout: 2s
    write_timeout: 30s
    request_timeout: 10s
    rate_limit_per_minute: 120
database:
    default: postgres
    drivers:
        sqlite:
            name: sqlite
            driver: sqlite3
            dsn: ":memory:"
            log_level: 1 #日志级别, 1:Silent 2:Error 3:Warn 4:Info
        mysql:
            name: mysql
            driver: mysql
            dsn: gosso:gosso123@tcp(mysql:3308)/gosso_test?charset=utf8mb4&parseTime=True&loc=Local
            log_level: 1 #日志级别, 1:Silent 2:Error 3:Warn 4:Info
        postgres:
            name: postgres
            driver: pgx
            dsn: host=127.0.0.1 user=gosso password=gosso123 dbname=gosso_test port=5434 sslmode=disable TimeZone=Asia/Shanghai
            log_level: 1 #日志级别, 1:Silent 2:Error 3:Warn 4:Info
redis:
    dsn: redis://127.0.0.1:6381/0
    max_active_conns: 6000
    pool_timeout_seconds: 60
bigcache:
    hard_max_cache_size: 6
task_pipeline:
    flush_size: 32
    buffer_size: 64
    flush_interval: 1s
smtp:
    host: localhost
    port: 1027
    username: ""
    password: ""
    from: "noreply@gosso.com"
captcha:
    type: math
log:
    level: -1 #日志级别, -1: debug, 0: info, 1: warn, 2: error, 3: fatal, 4: panic 5: fatal
auth:
    jwt_secret: "gosso-test-secret-for-integration"
    issuer: "http://localhost:8080"
    access_token_expiry: 15m
    refresh_token_expiry: 720h
    authorization_code_expiry: 10m
    default_scopes:
        - openid
        - profile
        - email
    private_key_path: ""
    key_id: "test-key"
    password_reset_base_url: "http://localhost:3000/reset-password"