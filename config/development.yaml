# Development configuration
# Sensitive values can be overridden with GOUNO_ prefixed env vars.
# Example: GOUNO_AUTH_ISSUER=http://localhost:8080 GOUNO_DATABASE_DRIVERS_POSTGRES_DSN=host=...
web_server:
    debug: true
    address: 0.0.0.0
    port: 8080
    idle_timeout: 60s
    read_timeout: 5s
    read_header_timeout: 2s
    write_timeout: 30s
    request_timeout: 10s
    max_body_size: 10485760  # 10MB
    shutdown_timeout: 30s
    trusted_proxies:
        - "172.21.0.0/16"  # Docker network (gosso-dev-network)
    csrf_skip_paths:
        - "/api/v1/auth/login"
        - "/api/v1/auth/password/forgot"
        - "/api/v1/auth/password/reset"
    rate_limits:
        login: 10
        token: 30
        passkey: 10
        api: 120
        admin: 60
        introspect: 20
        device_code: 10
        password: 5
        verify: 5
        health: 60
database:
    # Dev uses Viper defaults for pool sizing (max_open_conns=25, max_idle_conns=15).
    # Override via GOUNO_DATABASE_MAX_OPEN_CONNS env var or uncomment below.
    default: postgres
    drivers:
        postgres:
            name: postgres
            driver: pgx
            dsn: ${GOUNO_DATABASE_DRIVERS_POSTGRES_DSN}
            log_level: 1 #日志级别, 1:Silent 2:Error 3:Warn 4:Info
redis:
    dsn: redis://redis:6379
    max_active_conns: 20
    pool_timeout_seconds: 60
task_pipeline:
    flush_size: 32
    buffer_size: 64
    flush_interval: 1s
smtp:
    host: localhost
    port: 1025
    username: ""
    password: ""
    from: "noreply@gosso.com"
    tls_policy: "notls"
log:
    level: 0 #日志级别, -1: debug, 0: info, 1: warn, 2: error, 3: dpanic, 4: panic, 5: fatal
auth:
    issuer: "http://localhost:8080"
    # Dev-only TOTP key — set via GOUNO_AUTH_TOTP_ENCRYPTION_KEY env var (see docker-compose).
    # Default from config_manager.go is used when the env var is unset.
    totp_encryption_key: ""
    verify_hash_pepper: ""
    access_token_expiry: 15m
    refresh_token_expiry: 168h
    authorization_code_expiry: 10m
    device_code_expiry: 10m
    device_code_interval: 5s
    id_token_expiry: 15m
    session_ttl: 24h
    max_sessions: 5
    default_scopes:
        - openid
        - profile
        - email
    private_key_path: "./keys/private.pem"
    key_id: "gosso-dev"
    password_reset_base_url: "http://localhost:8080/reset-password"
    account_validator_cache_ttl: 5s
    # WebAuthn / Passkey configuration
    webauthn_rp_id: "localhost"
    webauthn_rp_name: "gouno-dev"
    webauthn_rp_origin: "http://localhost:3000"
    # MFA rate limiting (0 = use default)
    mfa_account_max_attempts: 10
    mfa_account_rate_limit_window: 5m
    # Login rate limiting
    login_rate_limit_window: 15m
    # Per-IP rate limit exemption for known NAT/proxy exit addresses.
    # The per-IP counter is intentionally NOT cleared after successful login
    # to prevent attackers from resetting the budget with stolen credentials.
    # If legitimate users share a public IP (NAT/proxy), add it here.
    # Per-IP+username limits still apply regardless of this allowlist.
    # login_ip_allowlist:
    #     - "203.0.113.0/24"
    #     - "198.51.100.5"
    # Password reset
    password_reset_revoke_concurrency: 5
    # SPA integration
    login_url: "/login"
    enable_cookie_auth: true
    auth_cookie_name: "access_token"
    include_user_roles: true
cors:
    allowed_origins:
        - "http://localhost:3000"
        - "http://localhost:5173"
        - "http://localhost:8080"
    allowed_methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
    allowed_headers:
        - Origin
        - Content-Type
        - Accept
        - Authorization
        - X-CSRF-Token
    allow_credentials: true
    max_age: 86400
oauth_providers:
    # IMPORTANT: Set client_id and client_secret via environment variables.
    # Example: GOUNO_OAUTH_PROVIDERS_GOOGLE_CLIENT_ID=xxx
    #          GOUNO_OAUTH_PROVIDERS_GOOGLE_CLIENT_SECRET=xxx
    google:
        client_id: ""
        client_secret: ""
        redirect_uri: "http://localhost:8080/api/auth/social/google/callback"
        scopes:
            - openid
            - email
            - profile
        auth_url: "https://accounts.google.com/o/oauth2/v2/auth"
        token_url: "https://oauth2.googleapis.com/token"
        userinfo_url: "https://www.googleapis.com/oauth2/v2/userinfo"
    github:
        client_id: ""
        client_secret: ""
        redirect_uri: "http://localhost:8080/api/auth/social/github/callback"
        scopes:
            - user:email
        auth_url: "https://github.com/login/oauth/authorize"
        token_url: "https://github.com/login/oauth/access_token"
        userinfo_url: "https://api.github.com/user"
    wechat:
        client_id: ""
        client_secret: ""
        redirect_uri: "http://localhost:8080/api/auth/social/wechat/callback"
        scopes: []
        auth_url: "https://open.weixin.qq.com/connect/qrconnect"
        token_url: "https://api.weixin.qq.com/sns/oauth2/access_token"
        userinfo_url: "https://api.weixin.qq.com/sns/userinfo"
observability:
    metrics_enabled: true
    tracing_enabled: false
    # otlp_endpoint: "http://localhost:4318"
