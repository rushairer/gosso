# Development configuration
# Sensitive values can be overridden with GOUNO_ prefixed env vars.
# Example: GOUNO_AUTH_JWT_SECRET=my-secret GOUNO_DATABASE_DRIVERS_POSTGRES_DSN=host=...
web_server:
    address: 0.0.0.0
    port: 8080
    idle_timeout: 60s
    read_timeout: 5s
    read_header_timeout: 2s
    write_timeout: 30s
    request_timeout: 10s
    rate_limits:
        login: 5
        token: 10
        passkey: 10
        api: 60
database:
    default: postgres
    drivers:
        sqlite:
            name: sqlite
            driver: sqlite3
            dsn: ./data/gosso_development.db
            log_level: 1 #日志级别, 1:Silent 2:Error 3:Warn 4:Info
        mysql:
            name: mysql
            driver: mysql
            dsn: ${GOUNO_DATABASE_DRIVERS_MYSQL_DSN}
            log_level: 1 #日志级别, 1:Silent 2:Error 3:Warn 4:Info
        postgres:
            name: postgres
            driver: pgx
            dsn: ${GOUNO_DATABASE_DRIVERS_POSTGRES_DSN}
            log_level: 1 #日志级别, 1:Silent 2:Error 3:Warn 4:Info
redis:
    dsn: redis://redis:6379
    max_active_conns: 6000
    pool_timeout_seconds: 60
task_pipeline:
    flush_size: 32
    buffer_size: 64
    flush_interval: 1s
smtp:
    host: localhost
    port: 1025
    username: ""
    password: ""
    from: "noreply@gosso.com"
captcha:
    type: math
log:
    level: 0 #日志级别, -1: debug, 0: info, 1: warn, 2: error, 3: dpanic, 4: panic, 5: fatal
auth:
    jwt_secret: ${GOUNO_AUTH_JWT_SECRET}
    issuer: "http://localhost:8080"
    access_token_expiry: 15m
    refresh_token_expiry: 720h
    authorization_code_expiry: 10m
    device_code_expiry: 10m
    device_code_interval: 5s
    default_scopes:
        - openid
        - profile
        - email
    private_key_path: "./keys/private.pem"
    password_reset_base_url: "http://localhost:3000/reset-password"
cors:
    allowed_origins:
        - "http://localhost:3000"
        - "http://localhost:5173"
    allowed_methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
    allowed_headers:
        - Origin
        - Content-Type
        - Accept
        - Authorization
        - X-CSRF-Token
    allow_credentials: true
    max_age: 86400
oauth_providers:
    google:
        client_id: ""
        client_secret: ""
        redirect_uri: "http://localhost:8080/api/auth/social/google/callback"
        scopes:
            - openid
            - email
            - profile
        auth_url: "https://accounts.google.com/o/oauth2/v2/auth"
        token_url: "https://oauth2.googleapis.com/token"
        userinfo_url: "https://www.googleapis.com/oauth2/v2/userinfo"
    github:
        client_id: ""
        client_secret: ""
        redirect_uri: "http://localhost:8080/api/auth/social/github/callback"
        scopes:
            - user:email
        auth_url: "https://github.com/login/oauth/authorize"
        token_url: "https://github.com/login/oauth/access_token"
        userinfo_url: "https://api.github.com/user"
    wechat:
        client_id: ""
        client_secret: ""
        redirect_uri: "http://localhost:8080/api/auth/social/wechat/callback"
        scopes: []
        auth_url: "https://open.weixin.qq.com/connect/qrconnect"
        token_url: "https://api.weixin.qq.com/sns/oauth2/access_token"
        userinfo_url: "https://api.weixin.qq.com/sns/userinfo"
