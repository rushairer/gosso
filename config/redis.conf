# Redis production configuration
bind 0.0.0.0
protected-mode yes
port 6379

# Persistence
save 900 1
save 300 10
save 60 10000
appendonly yes
appendfsync everysec

# Memory management
maxmemory 256mb
maxmemory-policy allkeys-lru

# Connection
timeout 300
tcp-keepalive 60
maxclients 1000

# Logging
loglevel notice
