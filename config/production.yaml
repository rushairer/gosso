web_server:
    address: 0.0.0.0
    port: 8080
    idle_timeout: 60s
    read_timeout: 5s
    read_header_timeout: 2s
    write_timeout: 30s
    request_timeout: 10s
    rate_limit_per_minute: 120
    rate_limits:
        login: 5
        token: 10
        passkey: 10
        api: 60
database:
    default: postgres
    drivers:
        sqlite:
            name: sqlite
            driver: sqlite3
            dsn: ./data/gosso.db
            log_level: 1 #日志级别, 1:Silent 2:Error 3:Warn 4:Info
        mysql:
            name: mysql
            driver: mysql
            dsn: "${GOUNO_MYSQL_DSN}"
            log_level: 1 #日志级别, 1:Silent 2:Error 3:Warn 4:Info
        postgres:
            name: postgres
            driver: pgx
            dsn: "${GOUNO_DB_DSN}"
            log_level: 1 #日志级别, 1:Silent 2:Error 3:Warn 4:Info
redis:
    dsn: "${GOUNO_REDIS_DSN}"
    max_active_conns: 6000
    pool_timeout_seconds: 60
bigcache:
    hard_max_cache_size: 6
task_pipeline:
    flush_size: 32
    buffer_size: 64
    flush_interval: 1s
smtp:
    host: localhost
    port: 1025
    username: ""
    password: ""
    from: "noreply@gosso.com"
captcha:
    type: math
log:
    level: 0 #日志级别, -1: debug, 0: info, 1: warn, 2: error, 3: fatal, 4: panic 5: fatal
auth:
    jwt_secret: "${GOUNO_JWT_SECRET}"
    issuer: "https://gosso.example.com"
    access_token_expiry: 15m
    refresh_token_expiry: 720h
    authorization_code_expiry: 10m
    default_scopes:
        - openid
        - profile
        - email
    private_key_path: "/app/keys/private.pem"
    password_reset_base_url: "https://gosso.example.com/reset-password"