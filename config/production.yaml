# Production configuration
# Sensitive values can be overridden with GOUNO_ prefixed env vars.
# Example: GOUNO_AUTH_ISSUER=https://sso.example.com GOUNO_DATABASE_DRIVERS_POSTGRES_DSN=host=...
#
# Configuration values are overridden by environment variables with the GOUNO_ prefix.
# For example, redis.dsn is overridden by GOUNO_REDIS_DSN.
# See config/README.md for the full mapping.
web_server:
    address: 0.0.0.0
    port: 8080
    max_body_size: 10485760  # 10MB (matches development default)
    idle_timeout: 60s
    read_timeout: 5s
    read_header_timeout: 2s
    write_timeout: 30s
    request_timeout: 10s
    rate_limits:
        login: 10
        token: 30
        passkey: 10
        api: 120
        introspect: 20
        device_code: 10
database:
    default: postgres
    max_open_conns: 25
    max_idle_conns: 15
    conn_max_lifetime_sec: 300
    conn_max_idle_time_sec: 180
    drivers:
        postgres:
            name: postgres
            driver: pgx
            dsn: "${GOUNO_DATABASE_DRIVERS_POSTGRES_DSN}"
            log_level: 1 #日志级别, 1:Silent 2:Error 3:Warn 4:Info
redis:
    dsn: "${GOUNO_REDIS_DSN}"
    max_active_conns: 100
    pool_timeout_seconds: 60
task_pipeline:
    flush_size: 32
    buffer_size: 64
    flush_interval: 1s
smtp:
    host: "${GOUNO_SMTP_HOST}"
    port: "${GOUNO_SMTP_PORT}"
    username: "${GOUNO_SMTP_USERNAME}"
    password: "${GOUNO_SMTP_PASSWORD}"
    from: "${GOUNO_SMTP_FROM}"
    tls_policy: "${GOUNO_SMTP_TLS_POLICY}"
log:
    level: 0 #日志级别, -1: debug, 0: info, 1: warn, 2: error, 3: dpanic, 4: panic, 5: fatal
    format: json
auth:
    issuer: "${GOUNO_AUTH_ISSUER}"
    session_ttl: 24h
    max_sessions: 10
    access_token_expiry: 15m
    refresh_token_expiry: 168h
    authorization_code_expiry: 10m
    device_code_expiry: 10m
    device_code_interval: 5s
    id_token_expiry: 15m
    default_scopes:
        - openid
        - profile
        - email
    private_key_path: "/app/keys/private.pem"
    password_reset_base_url: "${GOUNO_PASSWORD_RESET_BASE_URL}"
    # REQUIRED: 64-char hex string (32 bytes) for encrypting TOTP secrets at rest.
    # Generate with: openssl rand -hex 32
    totp_encryption_key: "${GOUNO_AUTH_TOTP_ENCRYPTION_KEY}"
cors:
    allowed_origins:
        - "${GOUNO_CORS_ORIGIN}"
    allowed_methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
    allowed_headers:
        - Origin
        - Content-Type
        - Accept
        - Authorization
        - X-CSRF-Token
    allow_credentials: true
    max_age: 86400
oauth_providers:
    google:
        client_id: "${GOUNO_GOOGLE_CLIENT_ID}"
        client_secret: "${GOUNO_GOOGLE_CLIENT_SECRET}"
        redirect_uri: "${GOUNO_GOOGLE_REDIRECT_URI}"
        scopes:
            - openid
            - email
            - profile
    github:
        client_id: "${GOUNO_GITHUB_CLIENT_ID}"
        client_secret: "${GOUNO_GITHUB_CLIENT_SECRET}"
        redirect_uri: "${GOUNO_GITHUB_REDIRECT_URI}"
        scopes:
            - user:email
    wechat:
        client_id: "${GOUNO_WECHAT_CLIENT_ID}"
        client_secret: "${GOUNO_WECHAT_CLIENT_SECRET}"
        redirect_uri: "${GOUNO_WECHAT_REDIRECT_URI}"
        scopes: []