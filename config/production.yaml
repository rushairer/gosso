# Production configuration
# Sensitive values can be overridden with GOUNO_ prefixed env vars.
# Example: GOUNO_AUTH_ISSUER=https://sso.example.com GOUNO_DATABASE_DRIVERS_POSTGRES_DSN=host=...
#
# Configuration values are overridden by environment variables with the GOUNO_ prefix.
# For example, redis.dsn is overridden by GOUNO_REDIS_DSN.
# See config/README.md for the full mapping.
web_server:
    production: true
    address: 0.0.0.0
    port: 8080
    max_body_size: 10485760  # 10MB (matches development default)
    idle_timeout: 60s
    read_timeout: 5s
    read_header_timeout: 2s
    write_timeout: 30s
    request_timeout: 10s
    shutdown_timeout: 30s
    trusted_proxies:
        - "172.22.0.0/16"  # Docker network (gosso-prod-network)
    csrf_skip_paths:
        - "/api/v1/auth/login"
        - "/api/v1/auth/password/forgot"
        - "/api/v1/auth/password/reset"
    rate_limits:
        login: 5
        token: 10
        passkey: 10
        api: 60
        admin: 30
        introspect: 20
        device_code: 10
        password: 3
        verify: 3
database:
    default: postgres
    # Connection pool sizing: max_open_conns × app instances must stay below
    # PostgreSQL max_connections (default: 100 in postgresql.conf).
    # With 25 per instance, up to 3 instances fit comfortably. For more instances,
    # either raise max_connections or add a connection pooler (e.g. PgBouncer).
    max_open_conns: 25
    max_idle_conns: 15
    conn_max_lifetime_sec: 300
    conn_max_idle_time_sec: 180
    drivers:
        postgres:
            name: postgres
            driver: pgx
            dsn: ""
            log_level: 2 #日志级别, 1:Silent 2:Error 3:Warn 4:Info
redis:
    dsn: ""
    max_active_conns: 100
    pool_timeout_seconds: 60
task_pipeline:
    flush_size: 32
    buffer_size: 64
    flush_interval: 1s
smtp:
    host: ""
    port: 0
    username: ""
    password: ""
    from: ""
    tls_policy: "mandatory"
log:
    level: 0 #日志级别, -1: debug, 0: info, 1: warn, 2: error, 3: dpanic, 4: panic, 5: fatal
    format: json
auth:
    issuer: ""
    session_ttl: 24h
    max_sessions: 10
    access_token_expiry: 15m
    refresh_token_expiry: 168h
    authorization_code_expiry: 10m
    device_code_expiry: 10m
    device_code_interval: 5s
    id_token_expiry: 15m
    login_rate_limit_window: 15m
    # Per-IP rate limit exemption for known NAT/proxy exit addresses.
    # The per-IP counter is intentionally NOT cleared after successful login
    # to prevent attackers from resetting the budget with stolen credentials.
    # If legitimate users share a public IP (NAT/proxy), add it here.
    # Per-IP+username limits still apply regardless of this allowlist.
    # login_ip_allowlist:
    #     - "203.0.113.0/24"
    #     - "198.51.100.5"
    mfa_account_rate_limit_window: 15m
    password_reset_revoke_concurrency: 5
    default_scopes:
        - openid
        - profile
        - email
    private_key_path: "/app/keys/private.pem"
    key_id: ""
    password_reset_base_url: ""
    account_validator_cache_ttl: 5s
    # SPA integration
    login_url: "/login"
    enable_cookie_auth: true
    auth_cookie_name: "access_token"
    include_user_roles: true
    # WebAuthn / Passkey configuration (REQUIRED for passkey support)
    webauthn_rp_id: ""
    webauthn_rp_name: ""
    webauthn_rp_origin: ""
    # REQUIRED: 64-char hex string (32 bytes) for encrypting TOTP secrets at rest.
    # Generate with: openssl rand -hex 32
    totp_encryption_key: ""
    # REQUIRED in production: secret pepper for hashing verification codes in Redis.
    # Prevents rainbow-table attacks on the 6-digit numeric keyspace if Redis is compromised.
    # Generate with: openssl rand -hex 32
    verify_hash_pepper: ""
cors:
    allowed_origins: []
    allowed_methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
    allowed_headers:
        - Origin
        - Content-Type
        - Accept
        - Authorization
        - X-CSRF-Token
    allow_credentials: true
    max_age: 86400
oauth_providers:
    google:
        client_id: ""
        client_secret: ""
        redirect_uri: ""
        scopes:
            - openid
            - email
            - profile
    github:
        client_id: ""
        client_secret: ""
        redirect_uri: ""
        scopes:
            - user:email
    wechat:
        client_id: ""
        client_secret: ""
        redirect_uri: ""
        scopes: []

# Observability: Prometheus metrics and OpenTelemetry tracing.
# Both are disabled by default; enable per environment as needed.
observability:
    metrics_enabled: false
    tracing_enabled: false
    # otlp_endpoint: "http://jaeger:4318"  # OTLP HTTP endpoint for trace export
