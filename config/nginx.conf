worker_processes auto;
error_log /dev/stderr warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time';

    # Write logs to container stdout/stderr so the read-only root filesystem
    # does not need a writable /var/log/nginx directory.
    access_log /dev/stdout main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10m;

    # Hide server version
    server_tokens off;

    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # Rate limiting zones
    # Nginx and the application (gosso) each enforce independent rate limits:
    #   - Nginx: first layer — rejects excess requests at the reverse-proxy level before
    #     they reach the application, protecting against raw floods and reducing load.
    #   - gosso: second layer — per-user + per-IP sliding-window limits via Redis,
    #     providing finer-grained protection (e.g. per-account login throttling).
    # Both layers are intentional. Do not remove either without evaluating the other.
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;

    # SSL/TLS settings (shared)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    upstream gosso {
        server gosso:8080 max_fails=3 fail_timeout=10s;
        keepalive 32;
    }

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name _;

        # Allow liveness checks over HTTP.
        location = /health {
            access_log off;
            proxy_pass http://gosso;
            proxy_set_header Host $host;
        }

        # Readiness exposes dependency status, so restrict it to local/private networks.
        location = /readiness {
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;
            access_log off;
            proxy_pass http://gosso;
            proxy_set_header Host $host;
        }

        # Redirect all other HTTP traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS server
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;

        # OCSP Stapling
        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout 5s;

        # Security headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        # CSP is handled by Go middleware with per-request nonces
        # add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'" always;
        add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;

        # Health check endpoints (no access log, no rate limit)
        location = /health {
            access_log off;
            proxy_pass http://gosso;
            proxy_set_header Host $host;
        }

        # Readiness exposes dependency status, so restrict it to local/private networks.
        location = /readiness {
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;
            access_log off;
            proxy_pass http://gosso;
            proxy_set_header Host $host;
        }

        # Login endpoints (stricter rate limit)
        location /api/auth/login {
            limit_req zone=login burst=5 nodelay;
            proxy_pass http://gosso;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
            proxy_connect_timeout 5s;
        }

        # OAuth2 protocol endpoints
        location /oauth2/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://gosso;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
            proxy_connect_timeout 5s;
        }

        # API proxy
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://gosso;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
            proxy_connect_timeout 5s;
        }

        # OIDC discovery endpoints
        location /.well-known/ {
            limit_req zone=api burst=5 nodelay;
            proxy_pass http://gosso;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Swagger UI — restricted to localhost/private networks in production.
        # The Go app only registers swagger routes in debug mode, but nginx also
        # blocks access here as defense-in-depth against misconfiguration.
        location /swagger/ {
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;
            limit_req zone=api burst=5 nodelay;
            proxy_pass http://gosso/swagger/;
            proxy_set_header Host $host;
        }

        # Default
        location / {
            proxy_pass http://gosso;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
            proxy_connect_timeout 5s;
        }
    }
}
