# PostgreSQL production configuration
listen_addresses = '*'
port = 5432

# Memory
shared_buffers = 256MB
effective_cache_size = 512MB
work_mem = 4MB
maintenance_work_mem = 64MB

# WAL
wal_level = replica
max_wal_size = 1GB
min_wal_size = 80MB

# Connections
max_connections = 100

# Logging (stderr for Docker — logs collected by container runtime)
log_min_duration_statement = 500
log_statement = 'ddl'
log_destination = 'stderr'

# Performance
random_page_cost = 1.1
effective_io_concurrency = 200
