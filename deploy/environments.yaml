# 环境配置定义文件
# 定义各环境的基础设施端口映射和环境变量
# 这个文件作为 docker-compose 和 scripts/parse-config.go 的统一配置源

environments:
  development:
    description: "开发环境配置"
    app:
      external_port: 8081
      internal_port: 8080
      debug: true
      gin_mode: debug
    postgres:
      external_port: 5433
      internal_port: 5432
      database: gosso_dev
      user: gosso
      password: gosso123
    redis:
      external_port: 6380
      internal_port: 6379
      database: 0
    smtp:
      external_port: 1026
      internal_port: 1025
      host: mailpit
    mailpit:
      web_external_port: 8026
      web_internal_port: 8025
    network:
      name: gosso-dev-network
      subnet: 172.21.0.0/16

  test:
    description: "测试环境配置"
    app:
      external_port: 8082
      internal_port: 8080
      debug: true
      gin_mode: test
    postgres:
      external_port: 5434
      internal_port: 5432
      database: gosso_test
      user: gosso
      password: gosso123
    redis:
      external_port: 6381
      internal_port: 6379
      database: 1
    smtp:
      external_port: 1027
      internal_port: 1025
      host: mailpit-test
    mailpit:
      web_external_port: 8027
      web_internal_port: 8025
    network:
      name: gosso-test-network
      subnet: 172.23.0.0/16

  production:
    description: "生产环境配置"
    app:
      external_port: 8080
      internal_port: 8080
      debug: false
      gin_mode: release
    postgres:
      external_port: 5432
      internal_port: 5432
      database: gosso
      user: gosso
      password: gosso123
    redis:
      external_port: 6379
      internal_port: 6379
      database: 0
    nginx:
      http_port: 80
      https_port: 443
    network:
      name: gosso-prod-network
      subnet: 172.22.0.0/16

# 通用配置
common:
  images:
    golang: golang:alpine
    postgres: postgres:15-alpine
    redis: redis:7-alpine
    mailpit: axllent/mailpit:latest
    nginx: nginx:alpine
  
  volumes:
    postgres_data_suffix: _data
    redis_data_suffix: _data
    go_mod_cache: go-mod-cache