apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gosso.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gosso.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "gosso.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "gosso.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "gosso.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.config.webServer.port | default 8080 }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "gosso.fullname" . }}
          env:
            - name: GOUNO_DATABASE_DRIVERS_POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret | default (printf "%s-secrets" (include "gosso.fullname" .)) }}
                  key: database-dsn
            - name: GOUNO_REDIS_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret | default (printf "%s-secrets" (include "gosso.fullname" .)) }}
                  key: redis-dsn
            - name: GOUNO_AUTH_VERIFY_HASH_PEPPER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret | default (printf "%s-secrets" (include "gosso.fullname" .)) }}
                  key: auth-verify-hash-pepper
            - name: GOUNO_AUTH_TOTP_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret | default (printf "%s-secrets" (include "gosso.fullname" .)) }}
                  key: auth-totp-encryption-key
            {{- if .Values.config.smtp.password }}
            - name: GOUNO_SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret | default (printf "%s-secrets" (include "gosso.fullname" .)) }}
                  key: smtp-password
                  optional: true
            {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- if .Values.config.auth.privateKeyPath }}
            - name: jwt-keys
              mountPath: {{ dir .Values.config.auth.privateKeyPath }}
              readOnly: true
            {{- end }}
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
        {{- if .Values.config.auth.privateKeyPath }}
        - name: jwt-keys
          secret:
            secretName: {{ include "gosso.fullname" . }}-jwt
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
