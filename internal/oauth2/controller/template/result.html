<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Device Authorization Result</title>
    <style nonce="{{.CSPNonce}}">
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: #fff; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); padding: 32px; max-width: 480px; width: 100%; text-align: center; }
        h1 { font-size: 20px; margin-bottom: 12px; }
        .message { color: #666; font-size: 14px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>{{.Title}}</h1>
        <p class="message" role="status">{{.Message}}</p>
    </div>
</body>
</html>
