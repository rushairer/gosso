<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authorization Request</title>
    <style nonce="{{.CSPNonce}}">
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: #fff; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); padding: 32px; max-width: 480px; width: 100%; }
        h1 { font-size: 20px; margin-bottom: 8px; }
        .subtitle { color: #666; margin-bottom: 24px; font-size: 14px; }
        .scopes { margin: 16px 0; }
        .scope-item { padding: 8px 0; border-bottom: 1px solid #eee; font-size: 14px; }
        .scope-item:last-child { border-bottom: none; }
        .actions { display: flex; gap: 12px; margin-top: 24px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 6px; font-size: 15px; font-weight: 600; cursor: pointer; }
        .btn-approve { background: #2563eb; color: #fff; }
        .btn-approve:hover { background: #1d4ed8; }
        .btn-deny { background: #e5e7eb; color: #374151; }
        .btn-deny:hover { background: #d1d5db; }
    </style>
</head>
<body>
    <div class="card">
        <h1>{{.ClientName}} wants to access your account</h1>
        <p class="subtitle">This will allow the application to:</p>
        <div class="scopes">
            {{range .Scopes}}
            <div class="scope-item">{{.}}</div>
            {{end}}
        </div>
        <form method="POST" action="/oauth2/authorize">
            <input type="hidden" name="client_id" value="{{.ClientID}}">
            <input type="hidden" name="redirect_uri" value="{{.RedirectURI}}">
            <input type="hidden" name="scope" value="{{.Scope}}">
            <input type="hidden" name="state" value="{{.State}}">
            <input type="hidden" name="code_challenge" value="{{.CodeChallenge}}">
            <input type="hidden" name="code_challenge_method" value="{{.CodeChallengeMethod}}">
            <input type="hidden" name="nonce" value="{{.Nonce}}">
            <input type="hidden" name="consent_id" value="{{.ConsentID}}">
            <input type="hidden" name="csrf_token" id="csrf_token" value="{{.CSRFToken}}">
            <div class="actions">
                <button type="submit" name="approved" value="false" class="btn btn-deny">Deny</button>
                <button type="submit" name="approved" value="true" class="btn btn-approve">Allow</button>
            </div>
        </form>
    </div>
</body>
</html>
